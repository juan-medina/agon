name: Release Agent

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run tests
        shell: bash
        run: |
          dotnet test agent/Yurnik.Agent.Tests/Yurnik.Agent.Tests.csproj \
            --configuration Release

      - name: Install Velopack CLI
        shell: bash
        run: dotnet tool install -g vpk

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        shell: bash
        run: |
          dotnet publish agent/Yurnik.Agent/Yurnik.Agent.csproj \
            --configuration Release \
            --runtime win-x64 \
            --self-contained \
            --output publish/

      - name: Pack
        shell: bash
        run: |
          vpk pack \
            --packId Yurnik.Agent \
            --packVersion ${{ steps.version.outputs.VERSION }} \
            --packDir publish/ \
            --outputDir dist/ \
            --packTitle "Yurnik Agent" \
            --icon agent/Yurnik.Agent/Resources/tray.ico

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
